# AI真言机 配置文件
# API密钥优先从环境变量读取（GEMINI_API_KEY, OPENAI_API_KEY等）

llm:
  default_provider: gemini
  gemini:
    model: gemini-2.5-flash
    # api_key: 从 GEMINI_API_KEY 环境变量读取
  openai:
    model: gpt-4o-mini
    # api_key: 从 OPENAI_API_KEY 环境变量读取
  deepseek:
    model: deepseek-chat
    base_url: https://api.deepseek.com
    # api_key: 从 DEEPSEEK_API_KEY 环境变量读取

platforms:
  telegram:
    enabled: false
    # token: 从 TELEGRAM_BOT_TOKEN 环境变量读取
  twitter:
    enabled: false
    poll_interval_seconds: 60
  wechat:
    enabled: false
  bilibili:
    enabled: false

extractors:
  video_subtitles: true
  whisper_fallback: false
